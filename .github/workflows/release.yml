name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Windows cross compiler
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Test
        run: go test ./...

      - name: Build Linux amd64
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          mkdir -p dist/linux-amd64
          go build -ldflags="-s -w" -o dist/linux-amd64/rollback4sqlserver ./cmd/logrecovery

      - name: Build Windows amd64
        env:
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
          CC: x86_64-w64-mingw32-gcc
          CXX: x86_64-w64-mingw32-g++
          CGO_LDFLAGS: -lwinpthread
        run: |
          mkdir -p dist/windows-amd64
          go build -ldflags="-s -w" -o dist/windows-amd64/rollback4sqlserver.exe ./cmd/logrecovery

      - name: Package
        run: |
          cd dist
          tar -czf rollback4sqlserver-linux-amd64.tar.gz -C linux-amd64 rollback4sqlserver
          zip -j rollback4sqlserver-windows-amd64.zip windows-amd64/rollback4sqlserver.exe

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/rollback4sqlserver-linux-amd64.tar.gz \
            dist/rollback4sqlserver-windows-amd64.zip \
            --repo "${GITHUB_REPOSITORY}" \
            --title "rollback4sqlserver ${GITHUB_REF_NAME}" \
            --notes "Windows package contains rollback4sqlserver.exe. Linux package contains rollback4sqlserver."
